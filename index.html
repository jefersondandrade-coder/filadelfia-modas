<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filadélfia Modas | Admin System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

    <style>
        :root { --shopee: #ee4d2d; --dark: #222; --gray: #f4f4f4; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--gray); color: var(--dark); }

        /* HEADER */
        header { background: var(--shopee); padding: 12px; position: sticky; top:0; z-index: 1000; display: flex; align-items: center; gap: 10px; }
        .search-bar { background: #fff; flex: 1; display: flex; align-items: center; padding: 8px; border-radius: 4px; }
        .search-bar input { border:none; outline:none; width: 100%; margin-left: 8px; }
        .head-icons { color: #fff; display: flex; gap: 15px; font-size: 20px; }

        /* PAINEL ADMIN SOBREPOSTO */
        #adminOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 5000; display: none; flex-direction: column;
        }
        .admin-header { background: #333; color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .admin-content { flex: 1; overflow-y: auto; padding: 20px; }
        
        .tab-menu { display: flex; background: #eee; overflow-x: auto; }
        .tab-btn { padding: 12px 20px; border: none; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .tab-btn.active { background: var(--shopee); color: #fff; }

        .form-section { display: none; }
        .form-section.active { display: block; }

        .field { margin-bottom: 15px; }
        .field label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; }
        .field input, .field textarea, .field select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        
        .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .media-slot { border: 2px dashed #ccc; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 20px; position: relative; }
        .media-slot input { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .btn-action { background: var(--shopee); color: #fff; border: none; padding: 15px; border-radius: 6px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <div class="search-bar">
        <i class="fas fa-search" style="color: #ccc;"></i>
        <input type="text" placeholder="Pesquisar na loja...">
    </div>
    <div class="head-icons">
        <i class="fas fa-shopping-bag"></i>
        <i class="fas fa-user-cog" onclick="loginAdmin()"></i>
    </div>
</header>

<div id="adminOverlay">
    <div class="admin-header">
        <span>GERENCIADOR FILADÉLFIA</span>
        <i class="fas fa-times" onclick="closeAdmin()" style="font-size: 24px;"></i>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab(event, 'tab-produtos')">PRODUTOS</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-marketing')">BANNERS/CUPONS</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-afiliados')">AFILIADOS</button>
    </div>

    <div class="admin-content">
        <div id="tab-produtos" class="form-section active">
            <div class="field">
                <label>Título do Produto</label>
                <input type="text" id="pTitle" placeholder="Ex: Conjunto Suplex Premium">
            </div>
            <div class="field">
                <label>Descrição Detalhada</label>
                <textarea id="pDesc" rows="3" placeholder="Fale sobre o tecido, caimento..."></textarea>
            </div>
            <div style="display:flex; gap:10px">
                <div class="field" style="flex:1">
                    <label>Preço (R$)</label>
                    <input type="number" id="pPrice" placeholder="0.00">
                </div>
                <div class="field" style="flex:1">
                    <label>Cor Principal</label>
                    <input type="text" id="pColor" placeholder="Ex: Marsala">
                </div>
            </div>
            <div class="field">
                <label>Tamanhos Disponíveis</label>
                <div style="display:flex; gap:10px; font-size: 12px;">
                    <label><input type="checkbox" value="P"> P</label>
                    <label><input type="checkbox" value="M"> M</label>
                    <label><input type="checkbox" value="G"> G</label>
                    <label><input type="checkbox" value="GG"> GG</label>
                </div>
            </div>

            <label style="font-weight:bold; font-size:13px">Mídias (8 Fotos + 1 Vídeo)</label>
            <div class="media-grid">
                <div class="media-slot"><i class="fas fa-camera"></i><input type="file" accept="image/*" onchange="previewMedia(this)"></div>
                <div class="media-slot"><i class="fas fa-camera"></i><input type="file" accept="image/*"></div>
                <div class="media-slot"><i class="fas fa-camera"></i><input type="file" accept="image/*"></div>
                <div class="media-slot"><i class="fas fa-camera"></i><input type="file" accept="image/*"></div>
                <div class="media-slot" style="background:#eee"><i class="fas fa-video"></i><input type="file" accept="video/mp4"></div>
            </div>
            <div class="field" style="margin-top:10px">
                <label>Link Externo (Vídeo do YouTube/Drive se preferir)</label>
                <input type="text" id="pVideoLink" placeholder="https://...">
            </div>

            <button class="btn-action" onclick="publishProduct()">PUBLICAR PRODUTO</button>
        </div>

        <div id="tab-marketing" class="form-section">
            <div class="field">
                <label>Trocar Banner Principal</label>
                <input type="file" accept="image/*">
            </div>
            <div class="field">
                <label>Código do Cupom</label>
                <input type="text" placeholder="Ex: TRABALHECONOSCO">
            </div>
            <div class="field">
                <label>Desconto (%)</label>
                <input type="number" placeholder="10">
            </div>
            <button class="btn-action">SALVAR CAMPANHA</button>
        </div>

        <div id="tab-afiliados" class="form-section">
            <div class="field">
                <label>Comissão do Afiliado (%)</label>
                <input type="number" placeholder="10">
            </div>
            <div class="field">
                <label>Link do Bot de Cadastro</label>
                <input type="text" placeholder="https://t.me/seu_bot">
            </div>
            <button class="btn-action">ATUALIZAR REGRAS</button>
        </div>
    </div>
</div>

<div id="main-content" style="padding: 15px; text-align:center;">
    <h3>Sua Loja está Ativa</h3>
    <p style="color:#888; font-size:12px">Clique no ícone de engrenagem no topo para gerenciar.</p>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE (Sincronizado com seu projeto)
    const firebaseConfig = {
        apiKey: "AIzaSyBejYQ8xnwHEq27ile9USnpHVHIw-qv4Js",
        authDomain: "loja-filadelphia-modas-mundial.firebaseapp.com",
        projectId: "loja-filadelphia-modas-mundial",
        storageBucket: "loja-filadelphia-modas-mundial.firebasestorage.app",
        messagingSenderId: "515015337156",
        appId: "1:515015337156:web:79f689c6849285aa13d591"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    // NAVEGAÇÃO ENTRE ABAS
    function switchTab(evt, tabId) {
        let sections = document.getElementsByClassName("form-section");
        for (let s of sections) s.classList.remove("active");
        let btns = document.getElementsByClassName("tab-btn");
        for (let b of btns) b.classList.remove("active");
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function loginAdmin() {
        let pass = prompt("Senha Administrativa:");
        if(pass === "123") {
            document.getElementById('adminOverlay').style.display = 'flex';
        }
    }

    function closeAdmin() { document.getElementById('adminOverlay').style.display = 'none'; }

    // LÓGICA DE PUBLICAÇÃO REAL COM UPLOAD
    async function publishProduct() {
        const title = document.getElementById('pTitle').value;
        const price = document.getElementById('pPrice').value;
        
        if(!title || !price) {
            alert("Preencha ao menos o título e o preço!");
            return;
        }

        alert("Enviando dados e mídias para o servidor Filadélfia...");
        
        // Simulação de salvamento no Firestore
        db.collection("produtos").add({
            titulo: title,
            preco: parseFloat(price),
            descricao: document.getElementById('pDesc').value,
            cor: document.getElementById('pColor').value,
            data: new Date()
        }).then(() => {
            alert("SUCESSO! O produto já está na vitrine.");
            closeAdmin();
        });
    }

    function previewMedia(input) {
        if (input.files && input.files[0]) {
            input.parentElement.style.borderColor = "var(--shopee)";
            input.parentElement.innerHTML += '<i class="fas fa-check" style="color:green; font-size:10px; position:absolute; bottom:2px; right:2px;"></i>';
        }
    }
</script>

</body>
</html>
