<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filadélfia Modas | Shop Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <style>
        :root { --shopee: #ee4d2d; --bg: #f5f5f5; --white: #fff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); padding-bottom: 80px; }

        /* HEADER E BUSCA */
        header { background: #ee4d2d; padding: 15px; position: sticky; top:0; z-index: 1000; }
        .search-box { background: #fff; display: flex; align-items: center; padding: 10px; border-radius: 4px; }
        .search-box input { border:none; outline:none; flex:1; margin-left: 8px; }

        /* WHATSAPP FLUTUANTE */
        .wpp-btn { position: fixed; bottom: 90px; right: 20px; background: #25d366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 2000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-decoration: none; }

        /* GRID DE PRODUTOS */
        .products { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .p-card { background: #fff; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .p-media { aspect-ratio: 1/1; background: #eee; }
        .p-media img, .p-media video { width: 100%; height: 100%; object-fit: cover; }
        .p-info { padding: 10px; }
        .p-price { color: var(--shopee); font-size: 18px; font-weight: bold; }
        .btn-add { width: 100%; background: var(--shopee); color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; margin-top: 5px; }

        /* MODAIS */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:4000; display:none; padding: 20px; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width:100%; padding:12px; border:1px solid #ddd; border-radius:5px; }
        .btn-main { width:100%; background:var(--shopee); color:white; padding:15px; border:none; border-radius:5px; font-weight:bold; }
        
        /* NAV INFERIOR */
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; border-top: 1px solid #ddd; padding: 10px 0; z-index: 1001; }
        .nav-item { flex: 1; text-align: center; color: #666; font-size: 11px; cursor: pointer; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

<header>
    <div class="search-box">
        <i class="fas fa-search" style="color:#bbb"></i>
        <input type="text" placeholder="Buscar na Filadélfia Modas...">
    </div>
</header>

<a href="https://wa.me/5511985694216" class="wpp-btn"><i class="fab fa-whatsapp"></i></a>

<div id="product-list" class="products"></div>

<div style="background:#fff; padding:20px; margin:10px; border-radius:8px">
    <h4 style="color:var(--shopee)">SOBRE NÓS</h4>
    <p style="font-size:13px; color:#555">Filadélfia Modas Mundial<br>CNPJ: 37.032.413/0001-68</p>
</div>

<div id="modalLogin" class="modal">
    <h3>Minha Conta</h3><br>
    <div class="form-group"><input type="email" id="email" placeholder="E-mail"></div>
    <div class="form-group"><input type="password" id="pass" placeholder="Senha"></div>
    <button class="btn-main" onclick="entrar()">Entrar / Cadastrar</button><br><br>
    <button onclick="resetarSenha()" style="background:none; border:none; color:#888">Esqueci minha senha</button>
    <button onclick="fecharModal('modalLogin')" style="margin-top:20px">Voltar</button>
</div>

<div id="modalAdmin" class="modal">
    <h3>Painel do Vendedor</h3><br>
    <div class="form-group"><input type="text" id="pNome" placeholder="Nome do Produto"></div>
    <div class="form-group"><input type="number" id="pPreco" placeholder="Preço R$"></div>
    <div class="form-group"><input type="text" id="pUrl" placeholder="Link da Imagem ou Vídeo"></div>
    <button class="btn-main" onclick="salvarNovoProduto()">Publicar Agora</button>
    <button onclick="fecharModal('modalAdmin')" style="margin-top:20px">Sair do Painel</button>
</div>

<nav>
    <div class="nav-item" onclick="location.reload()"><i class="fas fa-home"></i>Início</div>
    <div class="nav-item" onclick="alert('Área de Afiliados em sincronização...')"><i class="fas fa-users"></i>Afiliados</div>
    <div class="nav-item" onclick="abrirModal('modalLogin')"><i class="fas fa-user"></i>Conta</div>
    <div class="nav-item" onclick="verificarAdmin()"><i class="fas fa-lock"></i>Admin</div>
</nav>

<script>
    // Cole aqui suas credenciais do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBejYQ8xnwHEq27ile9USnpHVHIw-qv4Js",
        authDomain: "loja-filadelphia-modas-mundial.firebaseapp.com",
        projectId: "loja-filadelphia-modas-mundial",
        storageBucket: "loja-filadelphia-modas-mundial.firebasestorage.app",
        messagingSenderId: "515015337156",
        appId: "1:515015337156:web:79f689c6849285aa13d591"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // CARREGAR PRODUTOS DO BANCO
    function carregarProdutos() {
        db.collection("produtos").onSnapshot(snap => {
            const list = document.getElementById('product-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                const isVideo = p.url.includes('.mp4');
                list.innerHTML += `
                    <div class="p-card">
                        <div class="p-media">
                            ${isVideo ? `<video src="${p.url}" autoplay muted loop playsinline></video>` : `<img src="${p.url}">`}
                        </div>
                        <div class="p-info">
                            <p style="font-size:12px">${p.nome}</p>
                            <p class="p-price">R$ ${parseFloat(p.preco).toFixed(2)}</p>
                            <button class="btn-add" onclick="checkout('${p.nome}', ${p.preco})">COMPRAR</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    // CHECKOUT E FRETE
    function checkout(nome, preco) {
        let freteMsg = preco <= 29.99 ? "Frete GRÁTIS para SP!" : "Consulte frete Melhor Envio.";
        const msg = encodeURIComponent(`Olá! Quero comprar o produto: ${nome} (R$ ${preco.toFixed(2)}). ${freteMsg}`);
        window.open(`https://wa.me/5511985694216?text=${msg}`);
    }

    // AUTH FUNCTIONS
    function entrar() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(e, s).catch(() => auth.createUserWithEmailAndPassword(e, s))
        .then(() => { alert("Acesso confirmado!"); fecharModal('modalLogin'); });
    }

    function resetarSenha() {
        const e = prompt("E-mail de recuperação:");
        if(e) auth.sendPasswordResetEmail(e).then(() => alert("Link enviado ao seu e-mail!"));
    }

    // ADMIN FUNCTIONS
    function verificarAdmin() {
        const s = prompt("Senha Administrativa:");
        if(s === "123") abrirModal('modalAdmin'); // Altere a senha '123' conforme desejar
    }

    function salvarNovoProduto() {
        const nome = document.getElementById('pNome').value;
        const preco = document.getElementById('pPreco').value;
        const url = document.getElementById('pUrl').value;
        if(nome && preco && url) {
            db.collection("produtos").add({ nome, preco, url, data: new Date() })
            .then(() => { alert("Sucesso!"); fecharModal('modalAdmin'); });
        }
    }

    function abrirModal(id) { document.getElementById(id).style.display = 'block'; }
    function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

    window.onload = carregarProdutos;
</script>
</body>
</html>
