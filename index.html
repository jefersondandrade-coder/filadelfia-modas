<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filadélfia Modas | Painel Ativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ee4d2d; --bg: #f4f4f4; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); padding-top: 70px; }

        /* HEADER REORGANIZADO: ÍCONES AO LADO DA LUPA */
        header { 
            background: linear-gradient(135deg, #f53d2d 0%, #f63 100%); 
            padding: 10px; 
            position: fixed; 
            top:0; width: 100%; 
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-container { 
            background: #fff; 
            display: flex; 
            align-items: center; 
            padding: 8px; 
            border-radius: 4px; 
            flex: 1;
        }
        .search-container input { border:none; outline:none; width: 100%; font-size: 14px; }
        .header-icons { display: flex; gap: 12px; color: white; font-size: 20px; }
        .header-icons i { cursor: pointer; }

        /* CARROSSEL AUTOMÁTICO */
        .carousel { width: 100%; height: 180px; overflow: hidden; position: relative; margin-bottom: 10px; }
        .carousel-inner { display: flex; transition: 0.5s; height: 100%; }
        .carousel-item { min-width: 100%; height: 100%; }
        .carousel-item img { width: 100%; height: 100%; object-fit: cover; }

        /* PRODUTOS E MÍDIA */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .product-card { background: #fff; border-radius: 4px; overflow: hidden; position: relative; }
        .media-box { aspect-ratio: 1/1; background: #eee; }
        .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }

        /* MODAL DE EDIÇÃO (PAINEL ADM) */
        .admin-panel { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: white; z-index: 2000; padding: 20px; overflow-y: auto;
        }
        .admin-panel input, .admin-panel select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-weight: bold; }
        .logout-btn { color: red; margin-top: 20px; display: block; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="search-container">
        <i class="fas fa-search" style="color:#ccc"></i>
        <input type="text" id="searchInput" placeholder="Buscar na Filadélfia..." onkeyup="filtrar()">
    </div>
    <div class="header-icons">
        <i class="fas fa-home" onclick="location.reload()"></i>
        <i class="fas fa-shopping-cart" onclick="abrirCheckout()"></i>
        <i class="fas fa-user-circle" id="userIcon" onclick="verificarAcesso()"></i>
    </div>
</header>

<div class="carousel">
    <div class="carousel-inner" id="carouselInner">
        <div class="carousel-item"><img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800"></div>
        <div class="carousel-item"><img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=800"></div>
    </div>
</div>

<div class="product-grid" id="productGrid">
    <div class="product-card" id="item-video-destaque">
        <div class="media-box">
            <video muted loop autoplay playsinline src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
        </div>
        <div style="padding:8px">
            <p style="font-size:11px">Destaque Coleção</p>
            <button onclick="abrirCheckout()" style="width:100%; background:black; color:white; border:none; padding:5px; margin-top:5px;">VER DETALHES</button>
        </div>
    </div>
</div>

<div id="adminPanel" class="admin-panel">
    <h2>Configurações da Loja</h2>
    <p>Olá, Administrador</p>
    <hr><br>
    <h4>Adicionar Novo Produto/Vídeo</h4>
    <input type="text" id="editNome" placeholder="Nome do Produto">
    <input type="text" id="editPreco" placeholder="Preço (Ex: 99.90)">
    <input type="text" id="editLink" placeholder="Link da Foto ou Vídeo (MP4)">
    <select id="editTipo">
        <option value="foto">Foto</option>
        <option value="video">Vídeo</option>
    </select>
    <button class="btn-save" onclick="salvarAlteracao()">PUBLICAR NO SITE</button>
    
    <a href="#" class="logout-btn" onclick="sair()">Sair da Conta ADM</a>
    <button onclick="fecharAdmin()" style="margin-top:20px; width:100%;">Voltar para a Loja</button>
</div>

<script>
    // 1. LÓGICA DO CARROSSEL
    let index = 0;
    const slides = document.getElementById('carouselInner');
    setInterval(() => {
        index = (index + 1) % 2; 
        slides.style.transform = `translateX(-${index * 100}%)`;
    }, 3000);

    // 2. BUSCA FUNCIONANDO
    function filtrar() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('product-card');
        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].innerText.toLowerCase();
            cards[i].style.display = name.includes(input) ? "block" : "none";
        }
    }

    // 3. SISTEMA DE ACESSO E SAÍDA
    let isAdmin = false;

    function verificarAcesso() {
        if (!isAdmin) {
            let senha = prompt("Senha Admin:");
            if (senha === "123") {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
            }
        } else {
            document.getElementById('adminPanel').style.display = 'block';
        }
    }

    function sair() {
        isAdmin = false;
        alert("Você saiu da conta adm.");
        location.reload();
    }

    function fecharAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

    // 4. CHECKOUT (DIRECIONAMENTO)
    function abrirCheckout() {
        // Como você quer um checkout real, aqui você pode integrar o link do Mercado Pago ou Stripe
        // Por enquanto, redireciona para uma confirmação
        let confirmar = confirm("Ir para o pagamento seguro?");
        if(confirmar) window.open("https://wa.me/5511985694216?text=Quero+finalizar+meu+carrinho");
    }

    function salvarAlteracao() {
        alert("Conectando ao banco de dados para salvar...");
        // Aqui entra a função db.collection('produtos').add({...}) que vimos antes
    }
</script>
</body>
</html>
