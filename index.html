
 <!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filadélfia Modas Mundial</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary:#ee4d2d;
--bg:#f5f5f5;
--white:#fff;
--border:#e8e8e8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:var(--bg)}

/* HEADER */
header{
background:var(--primary);
padding:15px;
color:#fff;
}

.header-main{
display:flex;
flex-wrap:wrap;
align-items:center;
gap:10px;
}

.logo{
font-weight:bold;
font-size:1.4em;
white-space:nowrap;
}

.search-box{
flex:1;
}

.search-box input{
width:100%;
padding:10px;
border:none;
border-radius:4px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#fff;
border-radius:6px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-info{
padding:10px;
}

.price{
color:var(--primary);
font-weight:bold;
}

.btn{
background:var(--primary);
color:#fff;
border:none;
padding:8px;
width:100%;
cursor:pointer;
margin-top:5px;
}

/* ADMIN */
#adminPanel{
display:none;
background:#fff;
padding:20px;
margin:20px;
border-radius:6px;
}

.media-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.media-box{
border:2px dashed var(--primary);
height:80px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
position:relative;
}

.media-box img{
width:100%;
height:100%;
object-fit:cover;
}

/* LOGIN */
#loginModal{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
padding:20px;
border-radius:8px;
z-index:1000;
}

/* ESTOQUE */
.low{color:#fa8c16;font-weight:bold}
.ok{color:#52c41a;font-weight:bold}

</style>

</head>

<body>

<header>
<div class="header-main">
<div class="logo">FILADÉLPHIA</div>

<div class="search-box">
<input placeholder="Buscar produtos...">
</div>

<div onclick="openLogin()">👤</div>
</div>
</header>

<!-- PRODUTOS -->

<div class="grid" id="products"></div>

<!-- ADMIN -->

<div id="adminPanel">

<h2>Adicionar Produto</h2>

<input id="name" placeholder="Nome"><br><br> <input id="price" placeholder="Preço"><br><br> <input id="stock" placeholder="Estoque"><br><br>

<div class="media-grid" id="media"></div><br>

<button class="btn" onclick="save()">Publicar</button>

<hr><br>

<h2>Produtos</h2>
<div id="adminList"></div>

</div>

<!-- LOGIN -->

<div id="loginModal">
<h3>Login</h3><br>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Senha"><br><br>

<button class="btn" onclick="login()">Entrar</button> <button class="btn" onclick="register()">Criar Conta</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyBejYQ8xnwHEq27ile9USnpHVHIw-qv4Js",
authDomain: "loja-filadelphia-modas-mundial.firebaseapp.com",
projectId: "loja-filadelphia-modas-mundial",
storageBucket: "loja-filadelphia-modas-mundial.firebasestorage.app",
messagingSenderId: "515015337156",
appId: "1:515015337156:web:79f689c6849285aa13d591"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let imgs=[];

/* LOGIN */
window.login=()=>signInWithEmailAndPassword(auth,email.value,pass.value);
window.register=()=>createUserWithEmailAndPassword(auth,email.value,pass.value);

/* AUTH */
onAuthStateChanged(auth,user=>{
if(user && user.email==="admin@filadelphiamodas.com.br"){
adminPanel.style.display="block";
}
});

/* UPLOAD */
function render(){
let html="";
for(let i=0;i<4;i++){
html+=`<div class="media-box" onclick="up(${i})">+</div>`;
}
media.innerHTML=html;
}
render();

window.up=i=>{
let input=document.createElement("input");
input.type="file";

input.onchange=e=>{
let r=new FileReader();
r.onload=ev=>{
imgs[i]=ev.target.result;
renderPreview();
};
r.readAsDataURL(e.target.files[0]);
};

input.click();
};

function renderPreview(){
let html="";
for(let i=0;i<4;i++){
html+=`
<div class="media-box" onclick="up(${i})">
${imgs[i]?`<img src="${imgs[i]}">`:'+'}
</div>`;
}
media.innerHTML=html;
}

/* SALVAR */
window.save=async()=>{
await addDoc(collection(db,"products"),{
name:name.value,
price:Number(price.value),
stock:Number(stock.value),
image:imgs[0]||"",
affiliate:location.origin+"?ref=user"
});
load();
loadAdmin();
};

/* LOJA */
async function load(){
const snap=await getDocs(collection(db,"products"));
let html="";

snap.forEach(d=>{
let p=d.data();

html+=`
<div class="card">
<img src="${p.image}">
<div class="card-info">
<div>${p.name}</div>
<div class="price">R$ ${p.price}</div>

<button class="btn" onclick="copy('${p.affiliate}')">
Afiliado
</button>
</div>
</div>
`;
});

products.innerHTML=html;
}
load();

/* ADMIN */
async function loadAdmin(){
const snap=await getDocs(collection(db,"products"));
let html="";

snap.forEach(d=>{
let p=d.data();

html+=`
<div>
${p.name} -
<span class="${p.stock<10?'low':'ok'}">${p.stock}</span>
<button onclick="del('${d.id}')">X</button>
</div>
`;
});

adminList.innerHTML=html;
}
loadAdmin();

window.del=id=>{
deleteDoc(doc(db,"products",id));
loadAdmin();
};

/* COPY */
window.copy=link=>{
navigator.clipboard.writeText(link);
alert("Link copiado");
};

/* UI */
window.openLogin=()=>loginModal.style.display="block";

</script>

</body>
</html>
